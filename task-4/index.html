<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aura Music Player - A premium web-based audio player with glassmorphism UI, interactive playlists, dynamic glows, custom sliders, speed adjustments, state persistence, and full controls.">
  <title>Aura Player | Premium Music Player</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Ambient Dynamic Colored Background Circles -->
  <div class="ambient-background">
    <div class="glow-circle glow-1" id="glow-1"></div>
    <div class="glow-circle glow-2" id="glow-2"></div>
  </div>

  <!-- Music Player Dashboard Container -->
  <main class="dashboard" id="dashboard">

    <!-- Left Panel: Sidebar / Playlist -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <!-- Music Logo SVG -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
          </svg>
          <span>AURA PLAYER</span>
        </div>
        <!-- Close Sidebar for Mobile -->
        <button class="close-sidebar-btn" id="close-sidebar-btn" aria-label="Close Playlist">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- Search Box -->
      <div class="search-container">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search track or artist..." aria-label="Search track or artist">
      </div>

      <!-- Dynamic Playlist Items -->
      <div class="playlist-container" id="playlist-container">
        <!-- Rendered by JS -->
      </div>
    </aside>

    <!-- Right Panel: Player View -->
    <section class="main-player">
      
      <!-- Top Header controls -->
      <header class="player-header">
        <!-- Mobile Sidebar Trigger -->
        <button class="menu-toggle-btn" id="menu-toggle-btn" aria-label="Open Playlist">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div class="now-playing-title">Now Playing</div>
        <div style="width: 20px;"></div> <!-- Spacer matching menu-toggle-btn width for perfect centering -->
      </header>

      <!-- Center Player Body -->
      <div class="player-body">
        
        <!-- Vinyl Record / Art -->
        <div class="album-art-wrapper">
          <div class="album-glow"></div>
          <div class="album-vinyl">
            <img src="" alt="Album Cover" class="album-cover" id="album-cover">
            <div class="vinyl-center"></div>
          </div>
        </div>

        <!-- Meta info -->
        <div class="song-details">
          <h1 class="song-title" id="song-title">Song Title</h1>
          <div class="song-artist" id="song-artist">Artist Name</div>
          
          <!-- Playback Speed controls -->
          <div class="speed-badge" id="speed-badge" title="Change Playback Speed">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span id="speed-val">1x</span>
          </div>
        </div>

        <!-- Controls Section -->
        <div class="player-controls">
          
          <!-- Seek Track Slider -->
          <div class="progress-area">
            <div style="position: relative; width: 100%;">
              <input type="range" class="seek-slider" id="progress-slider" min="0" max="100" value="0" aria-label="Track progress slider">
              <div class="progress-filled-track" id="progress-filled"></div>
            </div>
            <div class="time-labels">
              <span id="current-time">0:00</span>
              <span id="total-duration">--:--</span>
            </div>
          </div>

          <!-- Buttons Panel -->
          <div class="buttons-area">
            <!-- Shuffle -->
            <button class="control-btn" id="shuffle-btn" title="Shuffle Mode" aria-label="Toggle Shuffle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 3 21 3 21 8"></polyline>
                <line x1="4" y1="20" x2="21" y2="3"></line>
                <polyline points="21 16 21 21 16 21"></polyline>
                <line x1="15" y1="15" x2="21" y2="21"></line>
                <line x1="4" y1="4" x2="9" y2="9"></line>
              </svg>
            </button>

            <!-- Previous -->
            <button class="control-btn" id="prev-btn" title="Previous Song" aria-label="Previous Song">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="19 20 9 12 19 4 19 20"></polygon>
                <line x1="5" y1="19" x2="5" y2="5"></line>
              </svg>
            </button>

            <!-- Play / Pause -->
            <button class="play-pause-btn" id="play-pause-btn" title="Play / Pause" aria-label="Play or Pause">
              <!-- Default Play icon -->
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
            </button>

            <!-- Next -->
            <button class="control-btn" id="next-btn" title="Next Song" aria-label="Next Song">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 4 15 12 5 20 5 4"></polygon>
                <line x1="19" y1="5" x2="19" y2="19"></line>
              </svg>
            </button>

            <!-- Repeat -->
            <button class="control-btn active-state" id="repeat-btn" title="Repeat Playlist (All)" aria-label="Toggle Repeat Mode">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="17 1 21 5 17 9"></polyline>
                <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                <polyline points="7 23 3 19 7 15"></polyline>
                <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
              </svg>
            </button>
          </div>

          <!-- Bottom bar: Volume & Equalizer & Speed Dropdown Container -->
          <div class="bottom-controls">
            
            <!-- Volume Control -->
            <div class="volume-area">
              <button class="volume-btn" id="volume-btn" title="Toggle Mute" aria-label="Toggle Mute">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                  <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
              </button>
              <div style="position: relative; flex: 1;">
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1" aria-label="Volume slider">
                <div class="volume-filled-track" id="volume-filled"></div>
              </div>
            </div>

            <!-- Bouncing Equalizer Bars Visualizer -->
            <div class="equalizer-visualizer" id="visualizer">
              <div class="visualizer-bar"></div>
              <div class="visualizer-bar"></div>
              <div class="visualizer-bar"></div>
              <div class="visualizer-bar"></div>
              <div class="visualizer-bar"></div>
              <div class="visualizer-bar"></div>
              <div class="visualizer-bar"></div>
            </div>

            <!-- Playback Speed menu toggle overlay -->
            <div class="speed-dropdown">
              <div class="speed-options" id="speed-dropdown-menu">
                <button class="speed-option-btn" data-speed="0.5">0.5x</button>
                <button class="speed-option-btn selected" data-speed="1.0">1.0x</button>
                <button class="speed-option-btn" data-speed="1.5">1.5x</button>
                <button class="speed-option-btn" data-speed="2.0">2.0x</button>
              </div>
            </div>

          </div>

        </div>

      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
