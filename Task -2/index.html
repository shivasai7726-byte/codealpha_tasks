<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator-shell">
    <section class="calculator-card">
      <div class="display-panel">
        <div class="display-label">Calculator</div>
        <div id="expression" class="display-expression">0</div>
        <div id="preview" class="display-preview">0</div>
      </div>

      <div class="button-grid">
        <button class="action-btn" data-action="clear">AC</button>
        <button class="action-btn" data-action="delete">DEL</button>
        <button class="action-btn" data-value="/">÷</button>
        <button class="action-btn" data-value="*">×</button>

        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="action-btn" data-value="-">−</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="action-btn" data-value="+">+</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="action-btn equal-btn" data-action="equals">=</button>

        <button class="wide-btn" data-value="0">0</button>
        <button data-value=".">.</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
